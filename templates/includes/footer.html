<footer class="bg-dark text-white pt-5 pb-4 mt-5">
    <div class="container text-center text-md-start">
        <div class="row">

            <div class="col-md-5 col-lg-5 mx-auto mb-4">
                <h6 class="text-uppercase fw-bold">AI Blog</h6>
                <hr class="mb-4 mt-0 d-inline-block mx-auto"
                    style="width: 60px; background-color: #7c4dff; height: 2px"/>
                <p>
                    {{ footer_tagline }}
                </p>
            </div>

            <div class="col-md-3 col-lg-3 mx-auto mb-4">
                <h6 class="text-uppercase fw-bold">{{ i18n.footer_quick_access }}</h6>
                <hr class="mb-4 mt-0 d-inline-block mx-auto"
                    style="width: 60px; background-color: #7c4dff; height: 2px"/>
                <p><a href="{% url 'blog:anasayfa' %}" class="text-white text-decoration-none">{{ i18n.footer_home }}</a></p>
                <p><a href="{% url 'blog:contact' %}" class="text-white text-decoration-none">{{ i18n.footer_contact }}</a></p>

                {% if user.is_authenticated and user.is_staff %}
                    <p><a href="{% url 'blog:generate_article' %}" class="text-white text-decoration-none">{{ i18n.footer_generate }}</a></p>
                {% endif %}
            </div>

            <div class="col-md-3 col-lg-3 mx-auto mb-md-0 mb-4">
                <h6 class="text-uppercase fw-bold">{{ i18n.footer_follow }}</h6>
                <hr class="mb-4 mt-0 d-inline-block mx-auto"
                    style="width: 60px; background-color: #7c4dff; height: 2px"/>
                <p>
                    <a href="#!" class="text-white me-4" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
                    <a href="#!" class="text-white me-4" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
                    <a href="https://github.com/Erdemozer01/ai_blog" target="_blank" rel="noopener" class="text-white" aria-label="GitHub"><i class="fab fa-github"></i></a>
                </p>
            </div>

        </div>
    </div>

    <div class="text-center p-3" style="background-color: rgba(0, 0, 0, 0.2)">
        © {% now "Y" %} AI Blog. {{ i18n.footer_rights }}
    </div>
</footer>
