<title>AI Blog — Canlı Kristal Beyin</title>
<style>
  :root{--cyan:#36d1ff;--violet:#b260ff;--txt:#e9ebf2;--mut:#8b90a3;--line:#1c1f2b;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(1000px 760px at 50% 42%,#0e1626 0%,#070910 70%);
    color:var(--txt);font-family:ui-sans-serif,system-ui,Segoe UI,Roboto,sans-serif;
    overflow:hidden;-webkit-font-smoothing:antialiased;display:grid;place-items:center;}
  body.light{background:radial-gradient(1000px 760px at 50% 42%,#dfe2ea 0%,#bcc0cc 70%);color:#1b1e27}
  .perspective{perspective:1200px;width:72vmin;height:72vmin;display:grid;place-items:center}
  .float{animation:float 6s ease-in-out infinite;transform-style:preserve-3d;width:100%;height:100%;display:grid;place-items:center}
  .scene{position:relative;width:100%;height:100%;transform-style:preserve-3d;
    animation:turn 9s ease-in-out infinite}
  .glow{position:absolute;inset:8%;background:radial-gradient(circle at 38% 45%,rgba(80,210,255,.55),transparent 55%),
    radial-gradient(circle at 66% 55%,rgba(178,96,255,.5),transparent 58%);
    filter:blur(34px);animation:pulse 4.5s ease-in-out infinite;transform:translateZ(-40px)}
  .brain{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;
    filter:drop-shadow(0 0 26px rgba(90,180,255,.28));}
  .sheen{position:absolute;inset:0;pointer-events:none;mix-blend-mode:screen;
    background:linear-gradient(115deg,transparent 38%,rgba(255,255,255,.16) 48%,transparent 58%);
    animation:sheen 9s ease-in-out infinite}
  .sparkles{position:absolute;inset:0;pointer-events:none}
  .sp{position:absolute;width:7px;height:7px;margin:-3.5px 0 0 -3.5px;border-radius:50%;
    background:radial-gradient(circle,#fff 0%,rgba(190,240,255,.8) 40%,transparent 70%);
    box-shadow:0 0 8px 2px rgba(180,235,255,.8);opacity:0;animation:tw 3s ease-in-out infinite}
  .sp::before,.sp::after{content:"";position:absolute;left:50%;top:50%;background:rgba(255,255,255,.9);transform:translate(-50%,-50%)}
  .sp::before{width:1.5px;height:18px}.sp::after{width:18px;height:1.5px}
  @keyframes turn{0%{transform:rotateY(-17deg) rotateX(3deg)}50%{transform:rotateY(17deg) rotateX(-2deg)}100%{transform:rotateY(-17deg) rotateX(3deg)}}
  @keyframes float{0%,100%{transform:translateY(-1.5%)}50%{transform:translateY(1.5%)}}
  @keyframes pulse{0%,100%{opacity:.45}50%{opacity:.8}}
  @keyframes sheen{0%,100%{transform:translateX(-30%)}50%{transform:translateX(30%)}}
  @keyframes tw{0%,100%{opacity:0;transform:scale(.4)}45%{opacity:.95;transform:scale(1)}60%{opacity:.5;transform:scale(.8)}}
  .wordmark{position:fixed;left:32px;top:26px;font-weight:800;font-size:clamp(20px,2.4vw,30px);letter-spacing:-.01em}
  .wordmark .ai{color:var(--cyan)} body.light .wordmark .ai{color:#1597c9}
  .tag{position:fixed;left:34px;top:calc(26px + clamp(28px,3vw,42px));font-size:12px;letter-spacing:.3em;
    text-transform:uppercase;color:var(--mut);font-family:ui-monospace,monospace}
  .dock{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);display:flex;gap:8px;padding:8px;
    border-radius:16px;background:rgba(20,24,34,.6);backdrop-filter:blur(14px);border:1px solid var(--line);
    box-shadow:0 18px 50px -22px #000}
  body.light .dock{background:rgba(255,255,255,.62);border-color:#cfd3df}
  .btn{border:1px solid transparent;border-radius:11px;padding:10px 14px;font-size:13px;font-weight:600;
    cursor:pointer;color:var(--txt);background:#161922;transition:.18s;display:flex;align-items:center;gap:7px}
  body.light .btn{color:#222634;background:#eef0f6;border-color:#d3d7e2}
  .btn .dot{width:8px;height:8px;border-radius:50%;background:var(--mut)}
  .btn.on .dot{background:var(--cyan);box-shadow:0 0 10px var(--cyan)}
  .btn.go{background:linear-gradient(120deg,#1a2a3a,#241830)}
</style></head>
