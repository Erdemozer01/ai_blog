{% load static %}
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FASTQ Dosyası Yükle - Al-Blog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>

<div class="container mt-5">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card">
                <div class="card-header">
                    <h3>FASTQ Dosyası Yükle</h3>
                </div>
                <div class="card-body">
                    <p>
                        Lütfen analiz etmek istediğiniz <code>.fastq</code> veya <code>.fastq.gz</code>
                        dosyasını seçin.
                    </p>
                    <p>
                        Maksimum dosya boyutu: <strong>{{ max_size_str }}</strong>
                    </p>

                    {% if error %}
                        <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}

                    <form method="POST" enctype="multipart/form-data">

                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="file" class="form-label">Dosya Seçin:</label>
                            <input class="form-control" type="file" name="file" id="file" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">
                            Yükle ve Analiz Sayfasına Git
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
