{% extends 'base.html' %}
{% load static %}
{% load plotly_dash %}

{% block stylesheet %}
    <link rel="icon" type="image/png" href="{% static 'images/favicon.ico' %}">
{% endblock %}

{% block content %}
    <div class="plotly-app-container dash-container">
        {% plotly_direct name='BacterialDesignerApp' %}
    </div>

    {% if seo_html %}
    <section class="container my-5 seo-content">
        {{ seo_html|safe }}
    </section>
    {% endif %}

    {% if seo_faq %}
    <script type="application/ld+json">{{ seo_faq|safe }}</script>
    {% endif %}
{% endblock %}
