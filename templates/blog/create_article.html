{% extends 'base.html' %}
{% load static %}

{% block stylesheet %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        .ck-editor__editable_inline { min-height: 350px; }
    </style>
{% endblock %}

{% block content %}
<div class="container my-5" style="max-width: 850px;">
    <h2 class="mb-4"><i class="fas fa-pen-nib me-2"></i>Makale Oluştur</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="card mb-3">
            <div class="card-header bg-light"><strong>Genel Bilgiler</strong></div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label fw-bold">Başlık <span class="text-danger">*</span></label>
                    <input type="text" name="title" class="form-control" required
                           placeholder="Makale başlığı">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Anahtar Kelimeler</label>
                    <input type="text" name="keywords" class="form-control"
                           placeholder="virgülle ayırın: yapay zeka, biyoloji">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Kapak Fotoğrafı</label>
                    <input type="file" name="cover_image" class="form-control" accept="image/*">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Türkçe Özet</label>
                    <textarea name="turkish_abstract" class="form-control" rows="3"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">İngilizce Özet (Abstract)</label>
                    <textarea name="english_abstract" class="form-control" rows="3"></textarea>
                </div>
            </div>
        </div>

        <div class="card mb-3">
            <div class="card-header bg-light"><strong>Makale İçeriği <span class="text-danger">*</span></strong></div>
            <div class="card-body">
                <textarea name="content" id="editor"></textarea>
            </div>
        </div>

        <div class="card mb-3">
            <div class="card-header bg-light"><strong>Kaynakça</strong></div>
            <div class="card-body">
                <textarea name="bibliography" class="form-control" rows="6"
                          placeholder="1. Yazar, A. (2024). Başlık. Dergi."></textarea>
            </div>
        </div>

        <div class="d-flex justify-content-end gap-2">
            <a href="{% url 'blog:anasayfa' %}" class="btn btn-outline-secondary">İptal</a>
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save me-1"></i> Kaydet
            </button>
        </div>
    </form>
</div>

<script src="https://cdn.ckeditor.com/ckeditor5/41.4.2/classic/ckeditor.js"></script>
<script src="https://cdn.ckeditor.com/ckeditor5/41.4.2/classic/translations/tr.js"></script>
<script>
    let editorInstance;
    ClassicEditor
        .create(document.querySelector('#editor'), {
            toolbar: {
                items: [
                    'undo', 'redo', '|',
                    'heading', '|',
                    'bold', 'italic', 'link', '|',
                    'bulletedList', 'numberedList', '|',
                    'outdent', 'indent', '|',
                    'blockQuote', 'insertTable', 'uploadImage', 'mediaEmbed', '|',
                ],
                shouldNotGroupWhenFull: true
            },
            heading: {
                options: [
                    { model: 'paragraph', title: 'Paragraf', class: 'ck-heading_paragraph' },
                    { model: 'heading1', view: 'h2', title: 'Başlık 1', class: 'ck-heading_heading1' },
                    { model: 'heading2', view: 'h3', title: 'Başlık 2', class: 'ck-heading_heading2' },
                    { model: 'heading3', view: 'h4', title: 'Başlık 3', class: 'ck-heading_heading3' }
                ]
            },
            table: {
                contentToolbar: ['tableColumn', 'tableRow', 'mergeTableCells']
            },
            image: {
                toolbar: ['imageTextAlternative', 'imageStyle:inline',
                          'imageStyle:block', 'imageStyle:side']
            },
            simpleUpload: {
                uploadUrl: '{% url "blog:ckeditor_upload" %}',
                headers: {
                    'X-CSRFToken': '{{ csrf_token }}'
                }
            },
            language: 'tr'
        })
        .then(editor => { editorInstance = editor; })
        .catch(error => { console.error(error); });

    // Form gönderilmeden önce CKEditor içeriğini textarea'ya aktar
    document.querySelector('form').addEventListener('submit', function () {
        if (editorInstance) {
            document.querySelector('#editor').value = editorInstance.getData();
        }
    });
</script>
{% endblock %}
