{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow-sm">
                <div class="card-body text-center p-5">
                    <i class="fas fa-paper-plane fa-3x text-primary mb-3"></i>
                    <h3 class="mb-3">Yayın Talebi Gönder</h3>
                    <p class="text-muted mb-4">
                        <strong>"{{ article.title }}"</strong> başlıklı makalenizin anasayfada
                        yayınlanması için talep göndermek üzeresiniz. Yöneticiler makalenizi
                        inceledikten sonra uygunsa anasayfada yayınlanacaktır.
                    </p>
                    <form method="post" action="{% url 'blog:request_publish' article.id %}">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-primary me-2">
                            <i class="fas fa-paper-plane me-1"></i> Talebi Gönder
                        </button>
                        <a href="{% url 'blog:article_detail' article.id article.slug %}"
                           class="btn btn-outline-secondary">
                            İptal
                        </a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
